name: Continuous Red Packet Bot

# Bot ကို manual run ချင်ရင်ဖြစ်ဖြစ်၊ bot.py ကနေ လှမ်းနှိုးရင်ဖြစ်ဖြစ် အလုပ်လုပ်ဖို့ workflow_dispatch သုံးထားပါတယ်
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          # Python libraries များသွင်းခြင်း
          pip install -r requirements.txt
          
          # OpenCV နှင့် EasyOCR အတွက် လိုအပ်သော System Libraries များသွင်းခြင်း
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Run Bot
        env:
          # GitHub Secrets ထဲက သော့ချက်များကို Bot Code ဆီ ချိတ်ဆက်ပေးခြင်း
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python bot.py
