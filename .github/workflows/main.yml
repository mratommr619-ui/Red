name: Red Packet Bot v5.1 (Direct X)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0
          pip install --upgrade pip
          pip install telethon requests gspread google-auth opencv-python-headless easyocr twikit
      - name: Run Bot
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          # မိတ်ဆွေပေးထားတဲ့ Secret နာမည်တွေအတိုင်း ပြင်ထားပါတယ်
          X_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          X_CT0: ${{ secrets.CT0 }}
        run: python bot.py
