name: Red Packet Bot v5.5 (Strict Live)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install --upgrade pip
          pip install --upgrade httpx httpcore twikit telethon requests gspread google-auth
          
      - name: Run Bot
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          X_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          X_CT0: ${{ secrets.CT0 }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        # -u ထည့်လိုက်တဲ့အတွက် စာသားတွေ ဟန်းမနေဘဲ တန်းပေါ်လာပါလိမ့်မယ်
        run: python -u bot.py
