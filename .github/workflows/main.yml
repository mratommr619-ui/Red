name: Red Packet Bot Ultimate Fix

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install telethon requests gspread google-auth opencv-python-headless easyocr feedparser ntscraper yt-dlp
      
      - name: Generate Fresh Guest Cookie
        # YouTube ဆီကနေ Login မလိုတဲ့ Guest Cookie ကို Run တိုင်း အသစ်တောင်းခိုင်းတာပါ
        run: |
          yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" --print-cookies --url https://www.youtube.com/ > cookies.txt || echo "Guest Cookie Fetch Failed, using fallback"
          
      - name: Run Bot
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python bot.py
